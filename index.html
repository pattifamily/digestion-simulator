<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🫃 Digestion Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }
    h1 { 
      text-align: center; 
      padding: 15px; 
      font-size: 2em;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .game-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .track {
      background: linear-gradient(145deg, #2d2d44, #1f1f35);
      border-radius: 20px;
      padding: 15px;
      border: 3px solid #4a4a6a;
      position: relative;
    }
    
    .track h2 {
      font-size: 1em;
      color: #aaa;
      margin-bottom: 10px;
      text-align: center;
    }
    
    /* Digestive Tract Container */
    .digestive-tract {
      width: 320px;
      height: 600px;
      position: relative;
    }
    
    /* Esophagus - vertical tube */
    .esophagus {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 100px;
      background: linear-gradient(90deg, #e74c3c, #c0392b);
      border-radius: 20px;
      border: 3px solid #922b21;
      overflow: hidden;
    }
    
    /* Stomach - J shape */
    .stomach {
      position: absolute;
      top: 95px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 120px;
      background: linear-gradient(180deg, #e74c3c, #c0392b);
      border-radius: 50px 50px 80px 80px;
      border: 3px solid #922b21;
      overflow: hidden;
    }
    
    /* Small Intestine - squiggly tube */
    .small-intestine {
      position: absolute;
      top: 210px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      background: transparent;
    }
    
    .intestine-loop {
      position: absolute;
      border: 15px solid #f39c12;
      border-radius: 50%;
      border-top-color: transparent;
    }
    .loop1 { width: 80px; height: 80px; top: 0; left: 0; transform: rotate(45deg); }
    .loop2 { width: 80px; height: 80px; top: 0; right: 0; transform: rotate(-45deg); border-left-color: transparent; }
    .loop3 { width: 80px; height: 80px; top: 60px; left: 30px; transform: rotate(-45deg); border-right-color: transparent; }
    .loop4 { width: 80px; height: 80px; top: 60px; right: 30px; transform: rotate(45deg); border-left-color: transparent; }
    .loop5 { width: 80px; height: 80px; top: 120px; left: 0; transform: rotate(45deg); }
    .loop6 { width: 80px; height: 80px; top: 120px; right: 0; transform: rotate(-45deg); border-left-color: transparent; }
    
    /* Large Intestine/Colon - bigger tube */
    .large-intestine {
      position: absolute;
      top: 400px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 150px;
      border: 20px solid #a569bd;
      border-radius: 90px;
      border-bottom: none;
      background: transparent;
    }
    
    /* Rectum/Exit */
    .rectum {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 40px;
      background: #8e44ad;
      border-radius: 0 0 15px 15px;
      border: 3px solid #6c3483;
      border-top: none;
    }
    
    /* Food Items */
    .food-item {
      position: absolute;
      font-size: 24px;
      transition: all 0.5s ease;
      z-index: 10;
      filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
    }
    
    .food-item.esophagus-stage {
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      animation: swallow 2s ease-in forwards;
    }
    
    .food-item.stomach-stage {
      top: 130px;
      left: 50%;
      transform: translateX(-50%);
      animation: churn 2s ease-in-out infinite;
    }
    
    .food-item.intestine-stage {
      animation: wiggle 1s ease-in-out infinite;
    }
    
    @keyframes swallow {
      0% { top: -20px; opacity: 0; }
      20% { top: 10px; opacity: 1; }
      50% { top: 40px; }
      100% { top: 60px; opacity: 1; }
    }
    
    @keyframes churn {
      0%, 100% { transform: translateX(-50%) rotate(-10deg); }
      50% { transform: translateX(-50%) rotate(10deg); }
    }
    
    @keyframes wiggle {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    /* Undigested items */
    .undigested {
      position: absolute;
      font-size: 20px;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      animation: exit 2s ease-in forwards;
      opacity: 0;
    }
    
    @keyframes exit {
      0% { bottom: 50px; opacity: 0; }
      50% { opacity: 1; }
      100% { bottom: -10px; opacity: 1; }
    }
    
    /* Stats Panel */
    .stats {
      background: linear-gradient(145deg, #2d2d44, #1f1f35);
      border-radius: 20px;
      padding: 20px;
      border: 3px solid #4a4a6a;
      min-width: 250px;
    }
    .stats h2 { color: #feca57; margin-bottom: 15px; text-align: center; }
    .score { font-size: 2em; text-align: center; color: #48dbfb; margin-bottom: 15px; }
    .nutrient-bar {
      margin: 10px 0;
    }
    .nutrient-bar label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      color: #aaa;
    }
    .bar-bg {
      height: 20px;
      background: #1a1a2e;
      border-radius: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s;
    }
    .energy-fill { background: linear-gradient(90deg, #f39c12, #e67e22); }
    .protein-fill { background: linear-gradient(90deg, #e74c3c, #c0392b); }
    .vitamins-fill { background: linear-gradient(90deg, #2ecc71, #27ae60); }
    .fiber-fill { background: linear-gradient(90deg, #9b59b6, #8e44ad); }
    
    /* Food Selection */
    .food-select {
      background: linear-gradient(145deg, #2d2d44, #1f1f35);
      border-radius: 20px;
      padding: 20px;
      border: 3px solid #4a4a6a;
      min-width: 300px;
    }
    .food-select h2 { color: #ff6b6b; margin-bottom: 15px; text-align: center; }
    .food-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .food-btn {
      padding: 15px;
      font-size: 1.2em;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      background: linear-gradient(145deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .food-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }
    .food-btn:active { transform: scale(0.95); }
    .food-btn .points { font-size: 0.7em; opacity: 0.8; }
    
    /* Legend */
    .legend {
      background: linear-gradient(145deg, #2d2d44, #1f1f35);
      border-radius: 20px;
      padding: 15px;
      border: 3px solid #4a4a6a;
      font-size: 0.85em;
      color: #aaa;
      max-width: 320px;
    }
    .legend h3 { color: #feca57; margin-bottom: 10px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
    
    /* Poop Tracker */
    .poop-tracker {
      background: linear-gradient(145deg, #2d2d44, #1f1f35);
      border-radius: 20px;
      padding: 15px;
      border: 3px solid #4a4a6a;
      text-align: center;
    }
    .poop-tracker h3 { color: #a569bd; margin-bottom: 10px; }
    .poop-count { font-size: 2em; color: #8e44ad; }
  </style>
</head>
<body>
  <h1>🫃 Digestion Simulator 🌽</h1>
  
  <div class="game-area">
    <div class="digestive-tract track">
      <h2>Your Digestive System</h2>
      
      <div class="esophagus"></div>
      <div class="stomach"></div>
      <div class="small-intestine">
        <div class="intestine-loop loop1"></div>
        <div class="intestine-loop loop2"></div>
        <div class="intestine-loop loop3"></div>
        <div class="intestine-loop loop4"></div>
        <div class="intestine-loop loop5"></div>
        <div class="intestine-loop loop6"></div>
      </div>
      <div class="large-intestine"></div>
      <div class="rectum"></div>
      
      <div id="food-container"></div>
      <div id="exit-container"></div>
    </div>
    
    <div>
      <div class="stats">
        <h2>📊 Nutrition Stats</h2>
        <div class="score">Score: <span id="score">0</span></div>
        
        <div class="nutrient-bar">
          <label><span>⚡ Energy</span><span id="energy-val">0</span></label>
          <div class="bar-bg"><div class="bar-fill energy-fill" id="energy-bar" style="width: 0%"></div></div>
        </div>
        <div class="nutrient-bar">
          <label><span>💪 Protein</span><span id="protein-val">0</span></label>
          <div class="bar-bg"><div class="bar-fill protein-fill" id="protein-bar" style="width: 0%"></div></div>
        </div>
        <div class="nutrient-bar">
          <label><span>🥗 Vitamins</span><span id="vitamins-val">0</span></label>
          <div class="bar-bg"><div class="bar-fill vitamins-fill" id="vitamins-bar" style="width: 0%"></div></div>
        </div>
        <div class="nutrient-bar">
          <label><span>🌾 Fiber</span><span id="fiber-val">0</span></label>
          <div class="bar-bg"><div class="bar-fill fiber-fill" id="fiber-bar" style="width: 0%"></div></div>
        </div>
      </div>
      
      <div class="poop-tracker">
        <h3>💩 Poop Tracker</h3>
        <div class="poop-count" id="poop-count">0</div>
      </div>
      
      <div class="legend">
        <h3>🗺️ Journey Through Your Body</h3>
        <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div> Mouth → Esophagus</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Stomach (acid breaks it down)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> Small Intestine (nutrients absorbed)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a569bd"></div> Large Intestine (water absorbed)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8e44ad"></div> Rectum (exit!) 💩</div>
      </div>
    </div>
    
    <div class="food-select">
      <h2>🍽️ Choose Your Food!</h2>
      <div class="food-grid">
        <button class="food-btn" onclick="eatFood('🍎', 'Apple', 15, 2, 25, 5)">
          🍎 Apple<br><span class="points">+15 pts</span>
        </button>
        <button class="food-btn" onclick="eatFood('🥕', 'Carrot', 10, 3, 30, 8)">
          🥕 Carrot<br><span class="points">+10 pts</span>
        </button>
        <button class="food-btn" onclick="eatFood('🍗', 'Chicken', 20, 40, 10, 0)">
          🍗 Chicken<br><span class="points">+20 pts</span>
        </button>
        <button class="food-btn" onclick="eatFood('🍞', 'Bread', 25, 8, 5, 3)">
          🍞 Bread<br><span class="points">+25 pts</span>
        </button>
        <button class="food-btn" onclick="eatFood('🥚', 'Egg', 15, 30, 10, 0)">
          🥚 Egg<br><span class="points">+15 pts</span>
        </button>
        <button class="food-btn" onclick="eatFood('🍌', 'Banana', 18, 5, 20, 5)">
          🍌 Banana<br><span class="points">+18 pts</span>
        </button>
        <button class="food-btn" onclick="eatFood('🥦', 'Broccoli', 8, 8, 35, 10)">
          🥦 Broccoli<br><span class="points">+8 pts</span>
        </button>
        <button class="food-btn" onclick="eatFood('🌽', 'Corn', 12, 4, 5, 15)">
          🌽 Corn<br><span class="points">NOT DIGESTED!</span>
        </button>
        <button class="food-btn" onclick="eatFood('🥩', 'Steak', 25, 45, 5, 0)">
          🥩 Steak<br><span class="points">+25 pts</span>
        </button>
        <button class="food-btn" onclick="eatFood('🍪', 'Cookie', 30, 3, 2, 2)">
          🍪 Cookie<br><span class="points">+30 pts</span>
        </button>
        <button class="food-btn" onclick="eatFood('🥛', 'Milk', 15, 10, 15, 0)">
          🥛 Milk<br><span class="points">+15 pts</span>
        </button>
        <button class="food-btn" onclick="eatFood('🫐', 'Blueberries', 10, 3, 25, 8)">
          🫐 Blueberries<br><span class="points">+10 pts</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    let score = 0;
    let energy = 0, protein = 0, vitamins = 0, fiber = 0;
    let poopCount = 0;
    let foodQueue = [];
    
    const foodInfo = {
      '🍎': { name: 'Apple', energy: 15, protein: 2, vitamins: 25, fiber: 5 },
      '🥕': { name: 'Carrot', energy: 10, protein: 3, vitamins: 30, fiber: 8 },
      '🍗': { name: 'Chicken', energy: 20, protein: 40, vitamins: 10, fiber: 0 },
      '🍞': { name: 'Bread', energy: 25, protein: 8, vitamins: 5, fiber: 3 },
      '🥚': { name: 'Egg', energy: 15, protein: 30, vitamins: 10, fiber: 0 },
      '🍌': { name: 'Banana', energy: 18, protein: 5, vitamins: 20, fiber: 5 },
      '🥦': { name: 'Broccoli', energy: 8, protein: 8, vitamins: 35, fiber: 10 },
      '🌽': { name: 'Corn', energy: 12, protein: 4, vitamins: 5, fiber: 15, undigested: true },
      '🥩': { name: 'Steak', energy: 25, protein: 45, vitamins: 5, fiber: 0 },
      '🍪': { name: 'Cookie', energy: 30, protein: 3, vitamins: 2, fiber: 2 },
      '🥛': { name: 'Milk', energy: 15, protein: 10, vitamins: 15, fiber: 0 },
      '🫐': { name: 'Blueberries', energy: 10, protein: 3, vitamins: 25, fiber: 8 }
    };
    
    function updateStats() {
      document.getElementById('score').textContent = score;
      document.getElementById('energy-val').textContent = energy;
      document.getElementById('protein-val').textContent = protein;
      document.getElementById('vitamins-val').textContent = vitamins;
      document.getElementById('fiber-val').textContent = fiber;
      document.getElementById('poop-count').textContent = poopCount;
      
      document.getElementById('energy-bar').style.width = Math.min(energy, 100) + '%';
      document.getElementById('protein-bar').style.width = Math.min(protein, 100) + '%';
      document.getElementById('vitamins-bar').style.width = Math.min(vitamins, 100) + '%';
      document.getElementById('fiber-bar').style.width = Math.min(fiber, 100) + '%';
    }
    
    function eatFood(emoji, name, e, p, v, f) {
      const info = foodInfo[emoji];
      const id = Date.now();
      
      foodQueue.push({
        id,
        emoji,
        name,
        info,
        stage: 'esophagus',
        undigested: info.undigested || false
      });
      
      renderFood();
      
      if (foodQueue.length === 1) {
        processDigestion();
      }
    }
    
    function renderFood() {
      const container = document.getElementById('food-container');
      const exitContainer = document.getElementById('exit-container');
      
      // Render active food items
      container.innerHTML = foodQueue
        .filter(f => f.stage !== 'exited')
        .map(f => {
          let style = '';
          let left = '50%';
          let top = '30px';
          
          if (f.stage === 'esophagus') {
            top = '30px';
          } else if (f.stage === 'stomach') {
            top = '130px';
            if (f.undigested) {
              // Corn stays whole in stomach
              top = '160px';
            }
          } else if (f.stage === 'small-intestine') {
            top = '280px';
            left = (30 + Math.random() * 60) + '%';
          } else if (f.stage === 'large-intestine') {
            top = '450px';
            left = (20 + Math.random() * 60) + '%';
          } else if (f.stage === 'rectum') {
            top = '560px';
          }
          
          return `<div class="food-item" style="left:${left};top:${top};transform:translateX(-50%)">${f.emoji}</div>`;
        })
        .join('');
      
      // Render exited (poop) items
      exitContainer.innerHTML = foodQueue
        .filter(f => f.stage === 'exited')
        .map(f => `<div class="undigested">${f.emoji}</div>`)
        .join('');
    }
    
    function processDigestion() {
      const current = foodQueue.find(f => f.stage !== 'exited');
      if (!current) return;
      
      // Esophagus → Stomach (2 seconds)
      if (current.stage === 'esophagus') {
        current.stage = 'stomach';
        renderFood();
        setTimeout(processDigestion, 2000);
      }
      // Stomach (3 seconds, churns)
      else if (current.stage === 'stomach') {
        current.stage = 'small-intestine';
        if (!current.undigested) {
          score += current.info.energy + current.info.protein + current.info.vitamins + current.info.fiber;
          energy += current.info.energy;
          protein += current.info.protein;
          vitamins += current.info.vitamins;
          fiber += current.info.fiber;
        }
        updateStats();
        renderFood();
        setTimeout(processDigestion, 3000);
      }
      // Small Intestine (3 seconds)
      else if (current.stage === 'small-intestine') {
        current.stage = 'large-intestine';
        renderFood();
        setTimeout(processDigestion, 3000);
      }
      // Large Intestine (3 seconds, water absorbed)
      else if (current.stage === 'large-intestine') {
        current.stage = 'rectum';
        renderFood();
        setTimeout(processDigestion, 2500);
      }
      // Rectum → Exit!
      else if (current.stage === 'rectum') {
        current.stage = 'exited';
        poopCount++;
        updateStats();
        renderFood();
        setTimeout(processDigestion, 500);
      }
    }
  </script>
</body>
</html>
